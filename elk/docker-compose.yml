version: '5'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
      - kafka
    
  zookeeper:
    image: confluentinc:cp-zookeeper:3.7
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVIRTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
  
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - elasticsearch
      - logstash
      - kafka

  geo-enricher:
    build: ./enrichers
    command: python geo_enricher.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - GEOIP_DB_PATH=/data/GeoLite2-City.mmdb
    volumes:
      - ./enrichers:/app
      - geoip_data:/data
    depends_on:
      - kafka
    restart: unless-stopped

  dns-enricher:
    build: ./enrichers
    command: python dns_enricher.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./enrichers:/app
    depends_on:
      - kafka
    restart: unless-stopped

  pii-masker:
    build: ./enrichers
    command: python pii_masker.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./enrichers:/app
    depends_on:
      - kafka
    restart: unless-stopped

  anomaly-detector:
    build: ./enrichers
    command: python anomaly_detector.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./enriches:/app
      - ./models:/models
    depends_on:
      - kafka
    restart: unless-stopped
  
  jupiter:
    image: jupyter/datascience-notebook:latest
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: start-notebook.sh --NotebookApp.token

volumes:
  es_data:
