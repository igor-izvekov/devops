input {
    kafka {
        bootstrap_servers => "kafka:9092"
        topics => ["enriched-logs"]
        codec => json
        consumer_threads => 4
    }
}

filter {
    date {
        match => ["timestamp", "ISO8601"]
        target => "@timestamp"
    }
    mutate {
        add_field => {
            "environment" => "production"
            "received_at" => "%{@timestamp}"
        }
    }
}

output {
    elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "logs%{+YYYY.MM.dd}"
    }

    stdout {
        codec => rudydebug
    }
}