version: '5'

services:
  app:
    build:
      context: ./app
    ports:
      - 8080:8080
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/db?sslmode=disable
      - ALLOW_ORIGIN=http://localhost:3000
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    networks:
      - app-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
  
  liquibase:
    image: liquibase/liquibase:4.24.0
    volumes:
      - ./app/pkg/database/liquibase:/liquibase/changelog
    command:
      --url=jdbc:postgresql://db:5432/db
      --username=postgres
      --password=postgres
      --changeLogFile=changelog/changelog/db.changelog-master.xml
      --log-level=info
      update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
